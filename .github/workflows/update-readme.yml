name: 🔄 Auto-Update README

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          python - <<'EOF'
          import os, re, requests
          from collections import defaultdict

          USERNAME = os.getenv("GITHUB_USERNAME", "slenderongithub")
          TOKEN    = os.getenv("GITHUB_TOKEN", "")
          README   = "README.md"

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          LANG_BADGE = {
              "Python":     ("Python",     "3776AB", "python",     "white"),
              "JavaScript": ("JavaScript", "F7DF1E", "javascript", "black"),
              "TypeScript": ("TypeScript", "3178C6", "typescript", "white"),
              "C++":        ("C%2B%2B",    "00599C", "cplusplus",  "white"),
              "HTML":       ("HTML",       "E34F26", "html5",      "white"),
              "CSS":        ("CSS",        "1572B6", "css3",       "white"),
              "Rust":       ("Rust",       "000000", "rust",       "white"),
              "Go":         ("Go",         "00ADD8", "go",         "white"),
              "Java":       ("Java",       "ED8B00", "openjdk",    "white"),
              "Shell":      ("Shell",      "121011", "gnubash",    "white"),
          }

          EMOJIS = ["🎯","🛡️","💼","🎨","📊","🎮","🔐","⚡","🌐","🔬","🧠","🔧","📡","🚀","💡"]

          def get_repos():
              repos, page = [], 1
              while True:
                  r = requests.get(
                      f"https://api.github.com/users/{USERNAME}/repos",
                      headers=HEADERS,
                      params={"per_page": 100, "page": page, "type": "owner"},
                  )
                  r.raise_for_status()
                  batch = r.json()
                  if not batch:
                      break
                  repos.extend(b for b in batch if not b["fork"])
                  page += 1
              repos.sort(key=lambda x: x["stargazers_count"], reverse=True)
              return repos

          def get_languages(repo_name):
              r = requests.get(
                  f"https://api.github.com/repos/{USERNAME}/{repo_name}/languages",
                  headers=HEADERS,
              )
              return r.json() if r.status_code == 200 else {}

          def lang_badge(lang, repo_url):
              p = LANG_BADGE.get(lang, (lang, "555555", "github", "white"))
              return (f"[![{lang}](https://img.shields.io/badge/{p[0]}-{p[1]}"
                      f"?style=for-the-badge&logo={p[2]}&logoColor={p[3]})]({repo_url})")

          def build_projects(repos):
              cells = []
              for i, repo in enumerate(repos):
                  emoji = EMOJIS[i % len(EMOJIS)]
                  name  = repo["name"]
                  url   = repo["html_url"]
                  desc  = repo["description"] or "No description provided."
                  lang  = repo["language"] or "HTML"
                  stars = repo["stargazers_count"]
                  forks = repo["forks_count"]
                  badge = lang_badge(lang, url)
                  cell  = (f"### {emoji} {name}\n\n{badge}\n\n> {desc}\n\n"
                           f"**🔥 Lang:** {lang} &nbsp; "
                           f"[![Stars](https://img.shields.io/badge/⭐-{stars}-00f7ff?style=for-the-badge)]({url}) "
                           f"[![Forks](https://img.shields.io/badge/🍴-{forks}-00f7ff?style=for-the-badge)]({url})\n\n"
                           f"[📂 View Repository →]({url})")
                  cells.append(cell)
              lines = ["<table>"]
              for j in range(0, len(cells), 2):
                  lines.append("<tr>")
                  if j + 1 >= len(cells):
                      lines.append(f'<td width="50%" colspan="2" align="center">\n\n{cells[j]}\n\n</td>')
                  else:
                      lines.append(f'<td width="50%">\n\n{cells[j]}\n\n</td>')
                      lines.append(f'<td width="50%">\n\n{cells[j+1]}\n\n</td>')
                  lines.append("</tr>\n")
              lines.append("</table>")
              return "\n".join(lines)

          def build_langs(lang_totals, total_bytes):
              top = sorted(lang_totals.items(), key=lambda x: x[1], reverse=True)[:6]
              lines = []
              for lang, b in top:
                  pct  = (b / total_bytes * 100) if total_bytes else 0
                  fill = round(pct / 100 * 20)
                  bar  = "█" * fill + "░" * (20 - fill)
                  lines.append(f"{lang:<12} {bar}  {pct:>5.1f}%")
              return "```text\n" + "\n".join(lines) + "\n```"

          def replace_section(text, start, end, content):
              pat = rf"({re.escape(start)}).*?({re.escape(end)})"
              new, n = re.subn(pat, rf"\1\n{content}\n\2", text, flags=re.DOTALL)
              if not n:
                  print(f"WARNING: markers not found: {start}")
              return new

          print(f"Fetching repos for @{USERNAME}...")
          repos = get_repos()
          print(f"Found {len(repos)} repos.")

          lang_totals = defaultdict(int)
          for repo in repos:
              for lang, b in get_languages(repo["name"]).items():
                  lang_totals[lang] += b
          total_bytes = sum(lang_totals.values())

          with open(README, "r", encoding="utf-8") as f:
              content = f.read()

          content = replace_section(content, "<!-- PROJECTS:START -->", "<!-- PROJECTS:END -->", build_projects(repos))
          content = replace_section(content, "<!-- LANGS:START -->",    "<!-- LANGS:END -->",    build_langs(lang_totals, total_bytes))

          with open(README, "w", encoding="utf-8") as f:
              f.write(content)

          print("✅ README updated.")
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add README.md
          git diff --cached --quiet && echo "No changes." && exit 0
          git commit -m "chore(readme): auto-update projects & language stats [skip ci]"
          git push
